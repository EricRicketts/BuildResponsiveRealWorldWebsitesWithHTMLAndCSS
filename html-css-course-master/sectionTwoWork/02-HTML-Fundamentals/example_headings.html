<!DOCTYPE html>
<!-- We need the above required preamble as it informs the browser which version -->
<!-- of html is being used.  The HTML element is the required root element of an HTML document. -->
<!-- The HEAD element contains information not visible in the browser window.  -->
<!-- The content we want rendered goes into the BODY element -->
<html lang="en">
<head>
  <title>The Basic Language of the Web: HTML</title>
</head>

<body>
<!-- The goal of headings is to break up the document into sections and organize the content. -->
<!-- There are six different headings, <h1> to <h6>, each denoting a hierarchy, where <h1> is the top -->
<h1>The Basic Language of the Web: HTML</h1>
<h2>The Basic Language of the Web: HTML</h2>
<h3>The Basic Language of the Web: HTML</h3>
<h4>The Basic Language of the Web: HTML</h4>
<h5>The Basic Language of the Web: HTML</h5>
<h6>The Basic Language of the Web: HTML</h6>
</body>
</html>
